name: CI - Build Index

on:
  workflow_call:

jobs:
  build:
    name: Build Test Index
    uses: ./.github/workflows/bazel.yml
    with:
      name: Build Test Index
      run: |
        ./go bazel:build_test_index bazel-test-target-index.json
        gzip -c bazel-test-target-index.json > bazel-test-target-index.gz
      artifact-name: bazel-test-target-index
      artifact-path: bazel-test-target-index.gz

  cache:
    name: Cache Index
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download index
        uses: actions/download-artifact@v4
        with:
          name: bazel-test-target-index
      - name: Cache index
        uses: actions/cache/save@v4
        with:
          path: bazel-test-target-index.gz
          key: bazel-test-target-index-${{ github.run_id }}
