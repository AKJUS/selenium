name: CI - Ruby

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    uses: ./.github/workflows/bazel.yml
    with:
      name: Build
      run: bazel build //rb:selenium-devtools //rb:selenium-webdriver

  lint:
    name: Lint
    needs: build
    uses: ./.github/workflows/bazel.yml
    with:
      name: Lint
      run: ./go rb:lint

  unit-tests:
    name: Unit Tests
    needs: build
    uses: ./.github/workflows/bazel.yml
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby-version: 3.3.11
            os: ubuntu
          - ruby-version: 3.3.11
            os: windows
          - ruby-version: 3.3.11
            os: macos
          - ruby-version: 4.0.4
            os: ubuntu
          - ruby-version: jruby-10.1.0.0
            os: ubuntu
          - ruby-version: truffleruby-34.0.1
            os: ubuntu
    with:
      name: Unit Tests (${{ matrix.ruby-version }}, ${{ matrix.os }})
      os: ${{ matrix.os }}
      ruby-version: ${{ matrix.ruby-version }}
      rerun-with-debug: true
      run: >
        bazel test
        --keep_going
        --build_tests_only
        --test_size_filters small
        //rb/spec/...

  integration-tests-local:
    name: Local Tests
    needs: build
    uses: ./.github/workflows/bazel.yml
    strategy:
      fail-fast: false
      matrix:
        browser:
          - chrome
          - edge
          - firefox
        os:
          - windows
          - macos
        exclude:
          - browser: edge
            os: macos
    with:
      name: Local Tests (${{ matrix.browser }}, ${{ matrix.os }})
      browser: ${{ matrix.browser }}
      os: ${{ matrix.os }}
      rerun-with-debug: true
      run: >
        bazel test
        --keep_going
        --build_tests_only
        --flaky_test_attempts 2
        --local_test_jobs 1
        --test_size_filters large
        --test_tag_filters ${{ matrix.browser }}-local
        ${{ (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch') && '--test_env=SKIP_PENDING=true' || '' }}
        //rb/spec/...
