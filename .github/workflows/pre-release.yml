name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Selenium version to release'
        required: true
      chrome_channel:
        description: 'Chrome Channel for CDP'
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - early-stable

permissions:
  contents: read

jobs:
  get-approval:
    name: Get Approval
    uses: ./.github/workflows/get-approval.yml
    with:
      title: Release approval needed
      message: |
        Selenium ${{ github.event.inputs.version }} release preparation started.
        Please approve to lock trunk when ready.
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Run rust jobs in parallel with approval since work is not on trunk
  generate-rust-version:
    name: Generate Rust Version
    if: github.event.repository.fork == false
    uses: ./.github/workflows/bazel.yml
    with:
      name: Update Rust Version
      run: ./go rust:version ${{ inputs.version }}
      artifact-name: rust-version

  push-rust-version:
    name: Push Rust Version
    needs: generate-rust-version
    uses: ./.github/workflows/commit-changes.yml
    with:
      artifact-name: rust-version
      commit-message: "update selenium manager version and rust changelog"
      push-branch: rust-release-${{ inputs.version }}
    secrets:
      SELENIUM_CI_TOKEN: ${{ secrets.SELENIUM_CI_TOKEN }}

  selenium-manager:
    name: Release Selenium Manager
    needs: push-rust-version
    uses: ./.github/workflows/ci-rust.yml
    with:
      release: true
      branch: rust-release-${{ inputs.version }}
    secrets:
      SELENIUM_CI_TOKEN: ${{ secrets.SELENIUM_CI_TOKEN }}

  cleanup-rust-branch:
    name: Cleanup Rust Branch
    needs: selenium-manager
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SELENIUM_CI_TOKEN }}
      - name: Delete rust release branch
        run: |
          git push origin --delete rust-release-${{ inputs.version }}

  restrict-trunk:
    name: Restrict Trunk Branch
    needs: [get-approval, selenium-manager]
    uses: ./.github/workflows/restrict-trunk.yml
    with:
      restrict: true
    secrets: inherit

  normalize-version:
    name: Normalize Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Normalize version
        id: version
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION//[[:space:]]/}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          elif [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected major.minor or major.minor.patch"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  generate-updates:
    name: Generate ${{ matrix.name }}
    needs: [restrict-trunk, normalize-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: browsers
            run: ./go update_browsers ${{ inputs.chrome_channel }}
          - name: devtools
            run: ./go all:update_cdp ${{ inputs.chrome_channel }}
          - name: manager
            run: ./go update_manager
          - name: dependencies
            run: ./go release_update
          - name: authors
            run: ./go authors
    uses: ./.github/workflows/bazel.yml
    with:
      name: Update ${{ matrix.name }}
      run: ${{ matrix.run }}
      artifact-name: patch-${{ matrix.name }}

  generate-versions:
    name: Generate Versions
    needs: [restrict-trunk, normalize-version]
    uses: ./.github/workflows/bazel.yml
    with:
      name: Bump Versions
      run: ./go all:version ${{ needs.normalize-version.outputs.version }}
      artifact-name: patch-versions

  generate-changelogs:
    name: Generate Changelogs
    needs: [restrict-trunk, normalize-version]
    uses: ./.github/workflows/bazel.yml
    with:
      name: Update Changelogs
      run: ./go all:changelogs
      artifact-name: patch-changelogs

  create-pr:
    name: Create Pull Request
    needs: [normalize-version, generate-updates, generate-versions, generate-changelogs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trunk
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SELENIUM_CI_TOKEN }}
          ref: trunk
          fetch-depth: 0
      - name: Get latest trunk
        run: git pull --ff-only origin trunk
      - name: Download all patches
        uses: actions/download-artifact@v4
        with:
          pattern: patch-*
          path: patches
      - name: Prep git
        run: |
          git config --local user.email "selenium-ci@users.noreply.github.com"
          git config --local user.name "Selenium CI Bot"
      - name: Apply patches and commit
        id: apply
        run: |
          apply_patch() {
            local name="$1"
            local msg="$2"
            local patch="patches/patch-$name/changes.patch"
            if [ -f "$patch" ] && [ -s "$patch" ]; then
              git apply --index "$patch"
              git commit -m "$msg"
              echo "${name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
            fi
          }
          apply_patch browsers "update pinned browser versions"
          apply_patch devtools "update devtools versions"
          apply_patch manager "update selenium manager versions"
          apply_patch dependencies "update dependency versions"
          apply_patch authors "update authors file"
          apply_patch versions "bump versions in preparation for release"
          apply_patch changelogs "changelogs updated"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.SELENIUM_CI_TOKEN }}
          author: Selenium CI Bot <selenium-ci@users.noreply.github.com>
          delete-branch: true
          branch: release-preparation-${{ needs.normalize-version.outputs.version }}
          base: trunk
          title: "[build] Prepare for release of Selenium ${{ needs.normalize-version.outputs.version }}"
          body: |

            ### Updates Applied
            | Component | Status |
            |-----------|--------|
            | Browser and driver versions | ${{ steps.apply.outputs.browsers == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | CDP version | ${{ steps.apply.outputs.devtools == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | Selenium Manager version | ${{ steps.apply.outputs.manager == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | Update dependencies | ${{ steps.apply.outputs.dependencies == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | Update Authors | ${{ steps.apply.outputs.authors == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | Bump Versions | ${{ steps.apply.outputs.versions == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |
            | Draft Changelogs | ${{ steps.apply.outputs.changelogs == 'true' && '✅ Updated' || '⏭️ Skipped (no changes)' }} |

            ---
            Auto-generated by [release-preparation workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: C-build
          draft: true
